# Indexing Pipeline Configuration
# ================================
# Behavior settings for: Chunk -> Embed -> Store
# Service providers are configured in configs/services.yaml
#
# Usage:
#   python scripts/run_offline.py /path/to/file --experiment exp_001

# Experiment Isolation
# --------------------
# Each experiment creates a separate collection for clean ablation studies
experiment:
  id: "hippo"
  # Examples:
  #   "exp_001" -> collection: research_rag_exp_001
  #   "baseline" -> collection: research_rag_baseline

# Chunking Settings
# -----------------
chunking:
  mode: "default"
  modes:
    default:
      method: "semantic"
      max_chars: 1000
      min_chars: 200
      overlap: 0
      token_limit: 1000
      section_split_all: true
    hippo:
      method: "semantic"
      max_chars: 1000
      min_chars: 200
      overlap: 0
      token_limit: 1000
      section_split_file_types: ["pdf", "docx", "doc", "md", "txt"]
      by_type:
        pdf:
          method: "semantic"
          max_chars: 1000
          min_chars: 200
          overlap: 0
          token_limit: 1000
        docx:
          method: "semantic"
          max_chars: 1000
          min_chars: 200
          overlap: 0
          token_limit: 1000
        doc:
          method: "semantic"
          max_chars: 1000
          min_chars: 200
          overlap: 0
          token_limit: 1000
        md:
          method: "semantic"
          max_chars: 1000
          min_chars: 200
          overlap: 0
          token_limit: 1000
        txt:
          method: "semantic"
          max_chars: 1000
          min_chars: 200
          overlap: 0
          token_limit: 1000
        pptx:
          method: "segment"
          min_chars: 1
          overlap: 0
        ppt:
          method: "segment"
          min_chars: 1
          overlap: 0
        png:
          method: "file"
          overlap: 0
        jpg:
