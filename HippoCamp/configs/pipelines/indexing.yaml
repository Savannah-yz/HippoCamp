# Retrieval Settings (for deduplication check)
# ---------------------------------------------
retrieval:
  top_k: 100

# Intermediate I/O
# ----------------
# When disabled, data flows in memory for efficiency
# When enabled, saves intermediate results for debugging
save_intermediate:
  enabled: false
  metadata_dir: "./data/metadata"
  chunks_dir: "./data/chunks"
  embeddings_dir: "./data/embeddings"

